name: Minishell CI

on:
  push:
  pull_request:

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update
      - run: sudo apt-get install -y build-essential libreadline-dev libncurses-dev
      - run: make test_tokenizer
      - run: make test_check_token_sequence
      - run: make test_build_cmd_lst

  norm:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - run: pip3 install norminette
      - run: norminette src include