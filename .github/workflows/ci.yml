name: Minishell CI Pipeline

on:
  push:
  pull_request:

jobs:

  libft_norm:
    name: "Libft: Check Norm"
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install norminette

      - name: Run Norm
        working-directory: libs/Libft-2.2.1/tests
        run: make norm


  libft_unit_tests:
    name: "Libft: Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Run Unit Tests
        working-directory: libs/Libft-2.2.1/tests
        run: make test


  minishell_tests:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: test_norm
            label: "Minishell: Check Norm"

          - target: test_tokenizer
            label: "Minishell: Test Tokenizer"

          - target: test_check_token_sequence
            label: "Minishell: Test Check Token Sequence"

          - target: test_build_cmd_lst
            label: "Minishell: Test Command List Builder"

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libreadline-dev libncurses-dev python3 python3-pip
          pip3 install norminette

      - name: Run ${{ matrix.label }}
        continue-on-error: ${{ matrix.target == 'test_norm' }}
        run: make ${{ matrix.target }}