name: Minishell CI

on:
  push:
  pull_request:

jobs:
  tests:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [test_norm, test_tokenizer, test_check_token_sequence, test_build_cmd_lst]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libreadline-dev \
            libncurses-dev

      - name: Run ${{ matrix.target }}
        continue-on-error: ${{ matrix.target == 'test_norm' }}
        run: |
          make fclean
          make ${{ matrix.target }}