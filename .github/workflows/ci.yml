name: Minishell CI

on:
  push:
  pull_request:

jobs:
  libft_tests:
    name: Libft unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 python3-pip
          pip3 install norminette

      - name: Libft norm
        working-directory: libs/Libft-2.2.1/tests
        continue-on-error: true
        run: make norm

      - name: Libft unit tests
        working-directory: libs/Libft-2.2.1/tests
        run: make test

  minishell_tests:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [test_norm, test_tokenizer, test_check_token_sequence, test_build_cmd_lst]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libreadline-dev libncurses-dev python3 python3-pip
          pip3 install norminette

      - name: Run ${{ matrix.target }}
        continue-on-error: ${{ matrix.target == 'test_norm' }}
        run: make ${{ matrix.target }}